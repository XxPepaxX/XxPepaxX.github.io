<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme</title>
    <style>
<body>
<br><br>
<center><img src="Gato.png" width="450"></center>
<center><h1>Vete a la verga.</h1></center>
<center>
    <button id="boton">Salir</button>
</center>

<script>
const boton = document.getElementById("boton");

boton.onmouseover = function () {
    boton.style.position = "fixed";
    boton.style.left = Math.random() * (window.innerWidth - boton.offsetWidth) + "px";
    boton.style.top = Math.random() * (window.innerHeight - boton.offsetHeight) + "px";
};
</script>
</body>
</html>
