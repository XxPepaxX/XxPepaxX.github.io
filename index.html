<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme</title>
    <style>
        body {
            background-color: beige;
        }
    </style>
</head>
<body>

<br>
<br>

<center><img src="Gato.png" width="450"></center>

<center><h1>Vete a la verga.</h1></center>

<center>
    <button id="boton">Salir</button>
</center>

<script>
boton.addEventListener("click", function () {

    document.body.innerHTML = `
    <div id="apagando">
        <h1>Windows se está apagando...</h1>
        <h2>No apagues tu computadora.</h2>
        <p>Instalando actualizaciones 100%</p>
        <br><br>
        <div class="circulo"></div>
    </div>
    `;

    document.body.style.margin = "0";
    document.body.style.background = "#0078D7";
    document.body.style.color = "white";
    document.body.style.fontFamily = "Segoe UI";
    document.body.style.display = "flex";
    document.body.style.justifyContent = "center";
    document.body.style.alignItems = "center";
    document.body.style.height = "100vh";

    const estilo = document.createElement("style");
    estilo.innerHTML = `
        #apagando{
            text-align:center;
        }

        .circulo{
            width:50px;
            height:50px;
            border:6px solid rgba(255,255,255,.3);
            border-top:6px solid white;
            border-radius:50%;
            margin:auto;
            animation:girar 1s linear infinite;
        }

        @keyframes girar{
            from{transform:rotate(0deg);}
            to{transform:rotate(360deg);}
        }
    `;

    document.head.appendChild(estilo);

});
</script>

</body>
</html>
